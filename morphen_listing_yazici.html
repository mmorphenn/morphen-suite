
<style>
* { box-sizing: border-box; }
.wrap { padding: 1rem 0; font-family: var(--font-sans); }
.header { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; }
.header-icon { font-size: 24px; }
.header-title { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }
.header-sub { font-size: 13px; color: var(--color-text-secondary); margin-top: 2px; }
.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.full { grid-column: 1 / -1; }
label { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.04em; }
input, select, textarea { font-family: var(--font-sans); font-size: 13px; color: var(--color-text-primary); background: var(--color-background-secondary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 8px 12px; width: 100%; }
input:focus, select:focus, textarea:focus { outline: none; border-color: #1D9E75; background: var(--color-background-primary); }
textarea { resize: vertical; min-height: 70px; }
.gen-btn { width: 100%; padding: 11px; font-size: 14px; font-weight: 500; background: #1D9E75; color: white; border: none; border-radius: var(--border-radius-md); cursor: pointer; margin-top: 4px; display: flex; align-items: center; justify-content: center; gap: 8px; }
.gen-btn:hover { background: #0F6E56; }
.gen-btn:disabled { background: #aaa; cursor: not-allowed; }
.spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top: 2px solid white; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
@keyframes spin { to { transform: rotate(360deg); } }
.result-section { display: none; }
.result-block { margin-bottom: 1rem; }
.block-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.block-title { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.04em; display: flex; align-items: center; gap: 6px; }
.copy-btn { font-size: 12px; padding: 4px 10px; border-radius: var(--border-radius-md); cursor: pointer; display: flex; align-items: center; gap: 4px; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-secondary); color: var(--color-text-secondary); }
.copy-btn:hover { background: var(--color-background-primary); }
.copy-btn.copied { color: #1D9E75; border-color: #1D9E75; }
.text-box { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 12px 14px; font-size: 13px; color: var(--color-text-primary); line-height: 1.7; white-space: pre-wrap; word-break: break-word; }
.copy-all-btn { width: 100%; padding: 10px; font-size: 13px; border-radius: var(--border-radius-md); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 4px; }
.new-btn { width: 100%; padding: 9px; font-size: 13px; border-radius: var(--border-radius-md); cursor: pointer; margin-top: 6px; color: var(--color-text-secondary); }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; }
.b-hikaye { background: #E1F5EE; color: #085041; }
.b-bakim { background: #E6F1FB; color: #0C447C; }
.b-iade { background: #FAEEDA; color: #633806; }
.divider { height: 0.5px; background: var(--color-border-tertiary); margin: 1rem 0; }
</style>

<div class="wrap">
<h2 class="sr-only">Morphen Etsy listing metin üreticisi — ürün hikayesi, bakım talimatları ve iade politikası</h2>

<div class="header">
  <span class="header-icon">🦋</span>
  <div>
    <div class="header-title">Morphen — Listing Yazıcı</div>
    <div class="header-sub">Ürün bilgilerini gir, listing metinleri otomatik oluşsun</div>
  </div>
</div>

<div class="card" id="form-card">
  <div class="form-grid">
    <div class="form-group">
      <label>Ürün adı</label>
      <input type="text" id="urun-adi" placeholder="örn: Wildflower Floral Tee" />
    </div>
    <div class="form-group">
      <label>Marka</label>
      <select id="marka">
        <option value="Bella Canvas 3001">Bella Canvas 3001</option>
        <option value="Comfort Colors 1717">Comfort Colors 1717</option>
        <option value="Gildan 5000">Gildan 5000</option>
        <option value="Bella Canvas 3413">Bella Canvas 3413 (Triblend)</option>
        <option value="Comfort Colors 1745">Comfort Colors 1745 (Heavyweight)</option>
      </select>
    </div>
    <div class="form-group">
      <label>Niş</label>
      <input type="text" id="nis" placeholder="örn: nature lovers, floral aesthetic" />
    </div>
    <div class="form-group">
      <label>Hedef kitle</label>
      <input type="text" id="hedef" placeholder="örn: 25-40 yaş kadınlar, doğa sever" />
    </div>
    <div class="form-group">
      <label>Tasarım stili</label>
      <input type="text" id="stil" placeholder="örn: minimal floral, watercolor" />
    </div>
    <div class="form-group">
      <label>İptal süresi (saat)</label>
      <select id="iptal">
        <option value="12">12 saat</option>
        <option value="24" selected>24 saat</option>
        <option value="48">48 saat</option>
      </select>
    </div>
    <div class="form-group full">
      <label>Ek not (isteğe bağlı)</label>
      <textarea id="not" placeholder="Tasarım hakkında eklemek istediğin bir şey var mı?"></textarea>
    </div>
  </div>
  <div style="margin-top: 12px;">
    <button class="gen-btn" id="gen-btn" onclick="generate()">
      <div class="spinner" id="spinner"></div>
      <span id="gen-label"><i class="ti ti-sparkles" aria-hidden="true"></i> Listing metinlerini oluştur</span>
    </button>
  </div>
</div>

<div class="result-section" id="result-section">

  <div class="result-block">
    <div class="block-header">
      <div class="block-title"><span class="badge b-hikaye">Ürün hikayesi</span></div>
      <button class="copy-btn" onclick="copyBlock('hikaye-text', this)"><i class="ti ti-copy" aria-hidden="true"></i> Kopyala</button>
    </div>
    <div class="text-box" id="hikaye-text"></div>
  </div>

  <div class="result-block">
    <div class="block-header">
      <div class="block-title"><span class="badge b-bakim">Bakım talimatları</span></div>
      <button class="copy-btn" onclick="copyBlock('bakim-text', this)"><i class="ti ti-copy" aria-hidden="true"></i> Kopyala</button>
    </div>
    <div class="text-box" id="bakim-text"></div>
  </div>

  <div class="result-block">
    <div class="block-header">
      <div class="block-title"><span class="badge b-iade">İptal & iade politikası</span></div>
      <button class="copy-btn" onclick="copyBlock('iade-text', this)"><i class="ti ti-copy" aria-hidden="true"></i> Kopyala</button>
    </div>
    <div class="text-box" id="iade-text"></div>
  </div>

  <button class="copy-all-btn" onclick="copyAll()"><i class="ti ti-clipboard" aria-hidden="true"></i> Tümünü kopyala</button>
  <button class="new-btn" onclick="resetForm()"><i class="ti ti-refresh" aria-hidden="true"></i> Yeni ürün için sıfırla</button>
</div>
</div>

<script>
async function generate() {
  const urun = document.getElementById('urun-adi').value.trim();
  const marka = document.getElementById('marka').value;
  const nis = document.getElementById('nis').value.trim();
  const hedef = document.getElementById('hedef').value.trim();
  const stil = document.getElementById('stil').value.trim();
  const iptal = document.getElementById('iptal').value;
  const not = document.getElementById('not').value.trim();

  if (!urun || !nis) { alert('En azından ürün adı ve niş gerekli!'); return; }

  const key = localStorage.getItem('morphen_api_key');
  if (!key) { alert('API key bulunamadı. Lütfen Etsy Ürün Analizci uygulamasından key kaydet.'); return; }

  document.getElementById('spinner').style.display = 'block';
  document.getElementById('gen-label').style.display = 'none';
  document.getElementById('gen-btn').disabled = true;
  document.getElementById('result-section').style.display = 'none';

  const prompt = `Sen Morphen markası için Etsy listing metinleri yazıyorsun. Morphen, dönüşüm temalı bir t-shirt markası — kelebek logosu var, minimal ve zarif bir estetik var.

Ürün bilgileri:
- Ürün adı: ${urun}
- Marka: ${marka}
- Niş: ${nis}
- Hedef kitle: ${hedef || 'belirtilmedi'}
- Tasarım stili: ${stil || 'belirtilmedi'}
- İptal süresi: ${iptal} saat
${not ? '- Ek not: ' + not : ''}

Aşağıdaki 3 metni Türkçe ve İngilizce olarak yaz (önce Türkçe, sonra İngilizce). Samimi, sıcak ve Morphen'in zarif tonuyla yaz. Robotik değil.

JSON formatında ver, başka hiçbir şey yazma:
{
  "hikaye": "Ürün hikayesi — Türkçe 2-3 paragraf, sonra '---' sonra İngilizce 2-3 paragraf. Morphen'in dönüşüm temasına değin, ürünün kime hitap ettiğini anlat, neden özel olduğunu vurgula.",
  "bakim": "Bakım talimatları — önce Türkçe, sonra '---' sonra İngilizce. ${marka} için spesifik yıkama talimatları: derece, program, kurutma, ütü. Madde madde yaz.",
  "iade": "İptal ve iade politikası — önce Türkçe, sonra '---' sonra İngilizce. ${iptal} saat içinde iptal mümkün, sonrasında iade kabul edilmiyor (print on demand ürün olduğu için). Açık ve net ama nazik bir dille yaz."
}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 2000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    const text = data.content.map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const result = JSON.parse(clean);

    document.getElementById('hikaye-text').textContent = result.hikaye;
    document.getElementById('bakim-text').textContent = result.bakim;
    document.getElementById('iade-text').textContent = result.iade;

    document.getElementById('result-section').style.display = 'block';
    document.getElementById('form-card').style.display = 'none';

  } catch(e) {
    alert('Hata: ' + e.message);
  } finally {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('gen-label').style.display = 'inline';
    document.getElementById('gen-btn').disabled = false;
  }
}

function copyBlock(id, btn) {
  const text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.innerHTML = '<i class="ti ti-check" aria-hidden="true"></i> Kopyalandı';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.innerHTML = '<i class="ti ti-copy" aria-hidden="true"></i> Kopyala';
      btn.classList.remove('copied');
    }, 2000);
  });
}

function copyAll() {
  const hikaye = document.getElementById('hikaye-text').textContent;
  const bakim = document.getElementById('bakim-text').textContent;
  const iade = document.getElementById('iade-text').textContent;
  const all = `=== ÜRÜN HİKAYESİ ===\n${hikaye}\n\n=== BAKIM TALİMATLARI ===\n${bakim}\n\n=== İPTAL & İADE POLİTİKASI ===\n${iade}`;
  navigator.clipboard.writeText(all).then(() => {
    const btn = event.target.closest('button');
    btn.innerHTML = '<i class="ti ti-check" aria-hidden="true"></i> Tümü kopyalandı!';
    setTimeout(() => { btn.innerHTML = '<i class="ti ti-clipboard" aria-hidden="true"></i> Tümünü kopyala'; }, 2000);
  });
}

function resetForm() {
  document.getElementById('form-card').style.display = 'block';
  document.getElementById('result-section').style.display = 'none';
}
</script>
